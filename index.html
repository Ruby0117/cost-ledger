<title>Cost Basis Ledger</title>

<style>
  :root{
    --bg:#0D1117;
    --panel:#141B26;
    --panel-alt:#1B2432;
    --border:#28323F;
    --border-soft:#1F2833;
    --accent:#E8B44C;
    --accent-dim:#8A6A2E;
    --green:#4ADE80;
    --green-dim:#1E3A2A;
    --red:#F87171;
    --red-dim:#3A1E1E;
    --text:#E6E8EB;
    --text-muted:#8590A3;
    --text-dim:#4B5768;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  .app{max-width:920px;margin:0 auto;padding:28px 20px 60px;}

  .masthead{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:22px;}
  .masthead h1{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:2px;color:var(--accent);margin:0;text-transform:uppercase;}
  .masthead .sub{font-size:11px;color:var(--text-dim);font-family:var(--mono);letter-spacing:1px;}
  .save-indicator{font-family:var(--mono);font-size:10px;color:var(--text-dim);transition:color .3s;}
  .save-indicator.active{color:var(--green);}

  .add-ticker-row{display:flex;gap:10px;margin-bottom:24px;}
  .add-ticker-row input{flex:1;}
  .btn{
    font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:0.5px;
    background:var(--panel-alt);color:var(--accent);border:1px solid var(--border);
    padding:9px 16px;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;
  }
  .btn:hover{border-color:var(--accent-dim);background:#212B3A;}
  .btn.primary{background:var(--accent);color:#1A1408;border-color:var(--accent);}
  .btn.primary:hover{background:#F2C368;}
  .btn.ghost{background:transparent;color:var(--text-muted);border-color:transparent;}
  .btn.ghost:hover{color:var(--text);background:var(--panel-alt);}
  .btn.small{padding:6px 12px;font-size:11px;}
  .btn.danger{color:var(--red);}

  input,select{
    background:var(--panel-alt);border:1px solid var(--border);color:var(--text);
    font-family:var(--mono);font-size:13px;padding:9px 11px;border-radius:4px;outline:none;
  }
  input:focus,select:focus{border-color:var(--accent-dim);}
  input::placeholder{color:var(--text-dim);}
  label{font-size:10px;color:var(--text-muted);font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:5px;}

  .ticker-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:18px;overflow:hidden;}
  .ticker-head{padding:18px 20px;display:flex;align-items:flex-start;justify-content:space-between;}
  .ticker-symbol{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:1px;}
  .ticker-meta{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:4px;}
  .ticker-actions{display:flex;gap:8px;}

  .stats-row{display:flex;gap:0;border-top:1px solid var(--border-soft);}
  .stat{flex:1;padding:14px 20px;border-right:1px solid var(--border-soft);}
  .stat:last-child{border-right:none;}
  .stat .label{font-size:10px;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
  .stat .value{font-family:var(--mono);font-size:18px;font-weight:600;}
  .stat .value.pos{color:var(--green);}
  .stat .value.neg{color:var(--red);}
  .stat .value.gold{color:var(--accent);}

  .gauge-section{padding:16px 20px;border-top:1px solid var(--border-soft);}
  .gauge{margin-bottom:14px;}
  .gauge:last-child{margin-bottom:0;}
  .gauge-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
  .gauge-label .amt{color:var(--text);}
  .gauge-track{height:8px;background:var(--panel-alt);border-radius:4px;overflow:hidden;border:1px solid var(--border-soft);position:relative;}
  .gauge-fill{height:100%;border-radius:4px;transition:width .4s ease;}
  .gauge-fill.cost{background:linear-gradient(90deg,var(--accent-dim),var(--accent));}
  .gauge-fill.shares{background:linear-gradient(90deg,#2C5C8A,#4A9FE0);}
  .gauge-fill.done{background:linear-gradient(90deg,var(--green-dim),var(--green));}
  .zero-badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--green);background:var(--green-dim);border:1px solid #2E5A3E;padding:2px 8px;border-radius:3px;letter-spacing:0.5px;margin-left:8px;}

  .projection{padding:14px 20px;border-top:1px solid var(--border-soft);background:var(--panel-alt);display:flex;gap:24px;flex-wrap:wrap;}
  .proj-item{flex:1;min-width:140px;}
  .proj-item .label{font-size:10px;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
  .proj-item .value{font-family:var(--mono);font-size:15px;color:var(--accent);font-weight:600;}
  .proj-item .value.dim{color:var(--text-muted);font-size:12px;font-weight:400;}
  .proj-empty{padding:14px 20px;border-top:1px solid var(--border-soft);background:var(--panel-alt);color:var(--text-dim);font-family:var(--mono);font-size:11px;}

  .log-toggle{width:100%;background:var(--panel-alt);border:none;border-top:1px solid var(--border-soft);color:var(--text-muted);font-family:var(--mono);font-size:11px;padding:10px 20px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .log-toggle:hover{color:var(--text);}
  .log-body{display:none;border-top:1px solid var(--border-soft);}
  .log-body.open{display:block;}

  .round-form{padding:16px 20px;background:var(--panel-alt);border-bottom:1px solid var(--border-soft);}
  .type-tabs{display:flex;gap:6px;margin-bottom:14px;}
  .type-tab{flex:1;text-align:center;padding:8px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--text-muted);cursor:pointer;background:var(--panel);}
  .type-tab.active{border-color:var(--accent-dim);color:var(--accent);background:#241C0E;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .form-grid.single{grid-template-columns:1fr;}
  .form-actions{display:flex;justify-content:flex-end;gap:8px;}
  .hint{font-size:11px;color:var(--text-dim);margin:-6px 0 12px;font-family:var(--mono);}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-family:var(--mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;padding:10px 20px;border-bottom:1px solid var(--border-soft);}
  td{padding:10px 20px;font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--border-soft);color:var(--text-muted);}
  td.main{color:var(--text);}
  tr:last-child td{border-bottom:none;}
  .empty-log{padding:20px;text-align:center;color:var(--text-dim);font-family:var(--mono);font-size:11px;}
  .del-btn{color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px 6px;display:inline-block;}
  .del-btn:hover{color:var(--red);}
  .edit-btn:hover{color:var(--accent);}
  .actions-cell{white-space:nowrap;}
  .confirm-text{color:var(--text-muted);font-size:11px;margin-right:6px;}
  .confirm-yes{color:var(--red);cursor:pointer;font-weight:600;margin-right:10px;}
  .confirm-yes:hover{text-decoration:underline;}
  .confirm-no{color:var(--text-muted);cursor:pointer;}
  .confirm-no:hover{color:var(--text);text-decoration:underline;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-dim);}
  .empty-state .big{font-family:var(--mono);font-size:14px;color:var(--text-muted);margin-bottom:6px;}
  .empty-state .small{font-size:12px;}
</style>

<div class="app">
  <div class="masthead">
    <div>
      <h1>Cost Basis Ledger</h1>
      <div class="sub">滚动做T · 追踪有效成本归零进度</div>
    </div>
    <div class="save-indicator" id="saveIndicator">已同步</div>
  </div>
  <div class="sub" id="storageModeNote" style="margin:-14px 0 20px;"></div>

  <div class="add-ticker-row">
    <input id="newTicker" placeholder="标的代码，如 QQQM" style="flex:0 0 140px;">
    <input id="newShares" type="number" placeholder="当前股数" style="flex:0 0 110px;">
    <input id="newAvgCost" type="number" step="0.01" placeholder="当前均价 $" style="flex:0 0 130px;">
    <button class="btn primary" onclick="addTicker()">添加标的</button>
  </div>

  <div id="cardsContainer"></div>
</div>

<script>
const STORAGE_KEY = 'cost-basis-ledger-v1';
let state = { tickers: {} };
let openLogs = {};
let activeType = {};
let editingIndex = {}; // { [symbol]: historyIndex | null }
let pendingDelete = null; // { sym, idx } | null

// Works two ways: inside Claude (window.storage, synced to your account)
// or as a standalone page hosted anywhere (falls back to this browser's localStorage).
const hasClaudeStorage = (typeof window.storage !== 'undefined' && window.storage !== null);

const storageAdapter = {
  async get(key){
    if (hasClaudeStorage){
      return await window.storage.get(key, false);
    }
    const raw = localStorage.getItem(key);
    if (raw === null) throw new Error('not found');
    return { key, value: raw, shared: false };
  },
  async set(key, value){
    if (hasClaudeStorage){
      return await window.storage.set(key, value, false);
    }
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  }
};

function fmt(n){
  if (n === null || n === undefined || isNaN(n)) return '—';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtShares(n){
  return (Math.round(n*1000)/1000).toString();
}

async function loadState(){
  try{
    const res = await storageAdapter.get(STORAGE_KEY);
    if (res && res.value) state = JSON.parse(res.value);
  }catch(e){
    // no data yet — seed with the user's actual current positions
    state = {
      tickers: {
        QQQM: { originalShares: 22, originalCost: 4393.14, history: [] },
        SPMO: { originalShares: 11, originalCost: 1037.38, history: [] }
      }
    };
    await saveState();
  }
  render();
}

async function saveState(){
  const ind = document.getElementById('saveIndicator');
  try{
    await storageAdapter.set(STORAGE_KEY, JSON.stringify(state));
    if (ind){ ind.textContent = '已同步'; ind.classList.remove('active'); ind.classList.add('active'); }
  }catch(e){
    if (ind) ind.textContent = '保存失败，请重试';
  }
}

function computeCurrent(t){
  let shares = t.originalShares;
  let cost = t.originalCost;
  for (const r of t.history){
    if (r.type === 'dca'){
      shares += r.qty;
      cost += r.qty*r.price;
    } else if (r.type === 'sell'){
      shares -= r.qty;
      cost -= r.qty*r.price;
    } else if (r.type === 'premium'){
      cost -= r.amount;
    }
  }
  const avg = shares !== 0 ? cost/shares : 0;
  return { shares, cost, avg };
}

function addTicker(){
  const sym = document.getElementById('newTicker').value.trim().toUpperCase();
  const shares = parseFloat(document.getElementById('newShares').value);
  const avg = parseFloat(document.getElementById('newAvgCost').value);
  if (!sym || !shares || isNaN(avg)) { return; }
  if (state.tickers[sym]) { alert(sym + ' 已存在'); return; }
  state.tickers[sym] = { originalShares: shares, originalCost: shares*avg, history: [] };
  document.getElementById('newTicker').value = '';
  document.getElementById('newShares').value = '';
  document.getElementById('newAvgCost').value = '';
  saveState();
  render();
}

function removeTicker(sym){
  if (!confirm(sym + ' 的全部记录将被删除，确认？')) return;
  delete state.tickers[sym];
  saveState();
  render();
}

function toggleLog(sym){
  openLogs[sym] = !openLogs[sym];
  render();
}

function setType(sym, type){
  activeType[sym] = type;
  render();
}

function editRound(sym, idx){
  const r = state.tickers[sym].history[idx];
  editingIndex[sym] = idx;
  activeType[sym] = r.type;
  openLogs[sym] = true;
  render();
  // scroll the form into view after it re-renders
  setTimeout(() => {
    const form = document.querySelector(`#logbody-${sym} .round-form`);
    if (form) form.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 0);
}

function cancelEdit(sym){
  editingIndex[sym] = null;
  render();
}

function submitRound(sym){
  const t = state.tickers[sym];
  const type = activeType[sym] || 'dca';
  const dateEl = document.getElementById('date-'+sym);
  const date = dateEl.value || new Date().toISOString().slice(0,10);
  let round = { type, date };

  if (type === 'dca'){
    const qty = parseFloat(document.getElementById('dcaQty-'+sym).value) || 0;
    const price = parseFloat(document.getElementById('dcaPrice-'+sym).value) || 0;
    if (qty <= 0) return;
    round = { ...round, qty, price };
  } else if (type === 'sell'){
    const qty = parseFloat(document.getElementById('sellQty-'+sym).value) || 0;
    const price = parseFloat(document.getElementById('sellPrice-'+sym).value) || 0;
    if (qty <= 0) return;
    round = { ...round, qty, price };
  } else if (type === 'premium'){
    const amount = parseFloat(document.getElementById('premAmt-'+sym).value) || 0;
    const note = document.getElementById('premNote-'+sym).value || '';
    if (amount <= 0) return;
    round = { ...round, amount, note };
  }

  const editIdx = editingIndex[sym];
  if (editIdx !== undefined && editIdx !== null){
    t.history[editIdx] = round;
    editingIndex[sym] = null;
  } else {
    t.history.unshift(round);
  }
  saveState();
  render();
}

function requestDelete(sym, idx){
  pendingDelete = { sym, idx };
  render();
}

function cancelDelete(){
  pendingDelete = null;
  render();
}

function confirmDelete(){
  if (!pendingDelete) return;
  const { sym, idx } = pendingDelete;
  state.tickers[sym].history.splice(idx,1);
  if (editingIndex[sym] === idx) editingIndex[sym] = null;
  pendingDelete = null;
  saveState();
  render();
}

function computeProjection(t, cur){
  if (t.history.length === 0) return null;
  const peak = (t.peakCost !== undefined && t.peakCost !== null) ? t.peakCost : Math.max(t.originalCost, cur.cost);
  const totalReduction = peak - cur.cost;
  if (totalReduction <= 0) return null; // no net progress yet, can't project a pace

  const roundsCount = t.history.length;
  const avgReductionPerRound = totalReduction / roundsCount;

  const dates = t.history.map(r => new Date(r.date + 'T00:00:00')).filter(d => !isNaN(d));
  if (dates.length === 0) return null;
  const firstDate = new Date(Math.min(...dates));
  const today = new Date();
  const daysElapsed = Math.max(1, Math.round((today - firstDate) / 86400000));
  const avgReductionPerDay = totalReduction / daysElapsed;

  if (cur.cost <= 0){
    return { alreadyZero: true };
  }
  if (avgReductionPerRound <= 0 || avgReductionPerDay <= 0) return null;

  const roundsRemaining = Math.ceil(cur.cost / avgReductionPerRound);
  const daysRemaining = Math.ceil(cur.cost / avgReductionPerDay);
  const estDate = new Date(today.getTime() + daysRemaining*86400000);

  return {
    alreadyZero: false,
    avgReductionPerRound,
    roundsRemaining,
    daysRemaining,
    estDateStr: estDate.toISOString().slice(0,10)
  };
}

function roundLabel(r){
  if (r.type === 'dca') return '加仓 ' + fmtShares(r.qty) + '@' + fmt(r.price);
  if (r.type === 'sell') return '卖出 ' + fmtShares(r.qty) + '@' + fmt(r.price);
  if (r.type === 'premium') return '其他收入 +' + fmt(r.amount) + (r.note ? ' (' + r.note + ')' : '');
  return '';
}
function roundDelta(r){
  if (r.type === 'dca') return { dShares: r.qty, dCost: r.qty*r.price };
  if (r.type === 'sell') return { dShares: -r.qty, dCost: -r.qty*r.price };
  if (r.type === 'premium') return { dShares: 0, dCost: -r.amount };
  return { dShares:0, dCost:0 };
}

function render(){
  const container = document.getElementById('cardsContainer');
  const syms = Object.keys(state.tickers);
  if (syms.length === 0){
    container.innerHTML = '<div class="empty-state"><div class="big">还没有标的</div><div class="small">在上面填入代码、股数、均价，开始追踪</div></div>';
    return;
  }
  container.innerHTML = '';
  for (const sym of syms){
    const t = state.tickers[sym];
    const cur = computeCurrent(t);
    // The zero-cost gauge should track progress from the highest cost basis
    // this position has ever carried (it rises whenever you add capital via DCA),
    // not just the original cost at the moment the ticker was created.
    if (t.peakCost === undefined || t.peakCost === null){
      t.peakCost = Math.max(t.originalCost, cur.cost);
      saveState();
    } else if (cur.cost > t.peakCost){
      t.peakCost = cur.cost;
      saveState();
    }
    const costProgress = t.peakCost > 0 ? Math.max(0, Math.min(100, (t.peakCost - cur.cost)/t.peakCost*100)) : 0;
    const isZero = cur.cost <= 0;
    const sharesProgress = Math.max(0, Math.min(100, cur.shares/100*100));
    const avgClass = cur.avg < 0 ? 'pos' : (cur.avg === 0 ? 'gold' : '');
    const proj = computeProjection(t, cur);

    let projHtml = '';
    if (isZero){
      projHtml = ''; // zero badge already shown above, no need to project further
    } else if (!proj){
      projHtml = `<div class="proj-empty">多记几笔（至少1笔已生效的降本记录）之后，这里会自动预测大概还要滚多少轮/多久能到零成本</div>`;
    } else {
      projHtml = `
        <div class="projection">
          <div class="proj-item">
            <div class="label">平均每轮降本</div>
            <div class="value">${fmt(proj.avgReductionPerRound)}</div>
          </div>
          <div class="proj-item">
            <div class="label">预计还需</div>
            <div class="value">${proj.roundsRemaining} 轮</div>
          </div>
          <div class="proj-item">
            <div class="label">按当前节奏预计归零日期</div>
            <div class="value dim">${proj.estDateStr}（约${proj.daysRemaining}天后）</div>
          </div>
        </div>
      `;
    }

    const card = document.createElement('div');
    card.className = 'ticker-card';

    card.innerHTML = `
      <div class="ticker-head">
        <div>
          <div class="ticker-symbol">${sym}</div>
          <div class="ticker-meta">原始持仓 ${fmtShares(t.originalShares)} 股 · 原始成本 ${fmt(t.originalCost)}</div>
        </div>
        <div class="ticker-actions">
          <button class="btn ghost small" onclick="removeTicker('${sym}')">删除</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="label">当前股数</div>
          <div class="value">${fmtShares(cur.shares)}</div>
        </div>
        <div class="stat">
          <div class="label">有效成本总额</div>
          <div class="value ${cur.cost<0?'pos':(cur.cost===0?'gold':'')}">${fmt(cur.cost)}</div>
        </div>
        <div class="stat">
          <div class="label">有效均价</div>
          <div class="value ${avgClass}">${fmt(cur.avg)}</div>
        </div>
      </div>

      <div class="gauge-section">
        <div class="gauge">
          <div class="gauge-label">
            <span>距100股整手</span>
            <span class="amt">${fmtShares(cur.shares)} / 100</span>
          </div>
          <div class="gauge-track"><div class="gauge-fill shares" style="width:${sharesProgress}%"></div></div>
        </div>
      </div>
      ${projHtml}

      <button class="log-toggle" onclick="toggleLog('${sym}')">
        <span>记录 &amp; 历史 (${t.history.length})</span>
        <span>${openLogs[sym] ? '收起 ▲' : '展开 ▼'}</span>
      </button>

      <div class="log-body ${openLogs[sym] ? 'open' : ''}" id="logbody-${sym}"></div>
    `;
    container.appendChild(card);

    if (openLogs[sym]){
      const logBody = card.querySelector('#logbody-'+sym);
      const editIdx = editingIndex[sym];
      const isEditing = (editIdx !== undefined && editIdx !== null && t.history[editIdx]);
      const editingRound = isEditing ? t.history[editIdx] : null;
      const type = activeType[sym] || 'dca';
      const dateValue = isEditing ? editingRound.date : new Date().toISOString().slice(0,10);

      const formWrap = document.createElement('div');
      formWrap.className = 'round-form';
      formWrap.innerHTML = `
        ${isEditing ? '<div class="hint" style="color:var(--accent);margin-top:0;">正在修改这条记录</div>' : ''}
        <div class="type-tabs">
          <div class="type-tab ${type==='dca'?'active':''}" onclick="setType('${sym}','dca')">加仓</div>
          <div class="type-tab ${type==='sell'?'active':''}" onclick="setType('${sym}','sell')">卖出</div>
          <div class="type-tab ${type==='premium'?'active':''}" onclick="setType('${sym}','premium')">其他收入</div>
        </div>
        <div class="form-grid single">
          <div><label>日期</label><input type="date" id="date-${sym}" value="${dateValue}"></div>
        </div>
        <div id="typeFields-${sym}"></div>
        <div class="form-actions">
          ${isEditing ? `<button class="btn ghost small" onclick="cancelEdit('${sym}')">取消</button>` : ''}
          <button class="btn primary small" onclick="submitRound('${sym}')">${isEditing ? '保存修改' : '记一笔'}</button>
        </div>
      `;
      logBody.appendChild(formWrap);

      const fieldsWrap = formWrap.querySelector('#typeFields-'+sym);
      if (type === 'dca'){
        const rr = (isEditing && editingRound.type === 'dca') ? editingRound : {};
        fieldsWrap.innerHTML = `
          <div class="form-grid">
            <div><label>买入股数</label><input type="number" step="0.01" id="dcaQty-${sym}" placeholder="0" value="${rr.qty || ''}"></div>
            <div><label>买入价</label><input type="number" step="0.01" id="dcaPrice-${sym}" placeholder="0.00" value="${rr.price || ''}"></div>
          </div>
          <div class="hint">股数和成本都增加，均价会被重新加权计算</div>
        `;
      } else if (type === 'sell'){
        const rr = (isEditing && editingRound.type === 'sell') ? editingRound : {};
        fieldsWrap.innerHTML = `
          <div class="form-grid">
            <div><label>卖出股数</label><input type="number" step="0.01" id="sellQty-${sym}" placeholder="0" value="${rr.qty || ''}"></div>
            <div><label>卖出价</label><input type="number" step="0.01" id="sellPrice-${sym}" placeholder="0.00" value="${rr.price || ''}"></div>
          </div>
          <div class="hint">股数减少，卖出所得会从总成本里扣掉，从而拉低均价</div>
        `;
      } else if (type === 'premium'){
        const rr = (isEditing && editingRound.type === 'premium') ? editingRound : {};
        fieldsWrap.innerHTML = `
          <div class="form-grid">
            <div><label>收到金额</label><input type="number" step="0.01" id="premAmt-${sym}" placeholder="0.00" value="${rr.amount || ''}"></div>
            <div><label>备注（可选）</label><input type="text" id="premNote-${sym}" placeholder="如：卖put权利金" value="${rr.note || ''}"></div>
          </div>
          <div class="hint">直接抵扣有效成本，不改变股数</div>
        `;
      }

      const tableWrap = document.createElement('div');
      if (t.history.length === 0){
        tableWrap.innerHTML = '<div class="empty-log">还没有记录</div>';
      } else {
        let rows = '';
        t.history.forEach((r, idx) => {
          const d = roundDelta(r);
          const isPending = pendingDelete && pendingDelete.sym === sym && pendingDelete.idx === idx;
          const actionsCell = isPending
            ? `<span class="confirm-text">删除？</span>
               <span class="confirm-yes" onclick="confirmDelete()">确定</span>
               <span class="confirm-no" onclick="cancelDelete()">取消</span>`
            : `<span class="del-btn edit-btn" onclick="editRound('${sym}',${idx})" title="修改">✎</span>
               <span class="del-btn" onclick="requestDelete('${sym}',${idx})" title="删除">✕</span>`;
          rows += `<tr>
            <td>${r.date}</td>
            <td class="main">${roundLabel(r)}</td>
            <td class="${d.dCost<0?'pos':''}" style="color:${d.dCost<0?'var(--green)':'var(--text-muted)'}">${d.dCost<=0?'':''}成本${d.dCost>=0?'+':''}${fmt(d.dCost)}</td>
            <td>股数${d.dShares>=0?'+':''}${fmtShares(d.dShares)}</td>
            <td class="actions-cell">${actionsCell}</td>
          </tr>`;
        });
        tableWrap.innerHTML = `<table>
          <tr><th>日期</th><th>操作</th><th>成本变化</th><th>股数变化</th><th></th></tr>
          ${rows}
        </table>`;
      }
      logBody.appendChild(tableWrap);
    }
  }
}

loadState();
const modeNote = document.getElementById('storageModeNote');
if (modeNote){
  modeNote.textContent = hasClaudeStorage
    ? '存储方式：Claude云端（跟你的账号绑定）'
    : '存储方式：本机浏览器（换设备或清缓存会丢失，仅保存在这台设备/这个浏览器里）';
}
</script>
